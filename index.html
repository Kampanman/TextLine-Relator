<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, user-scalable=yes, maximum-scale=1.0, minimum-scale=1.0" />
    <meta name="description" content="Text-Relator" />
    <meta name="keywords" content="" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@6.x/css/materialdesignicons.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Sawarabi+Gothic" rel="stylesheet">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="./static/css/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
  <title>TextLine-Relator</title>
  <style lang="stylus" scoped>
    /*
      * モーダルに関する諸設定
      */
    .modal-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      z-index: 30;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }
    .modal-window {
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
    }
    .modal-content { padding: 10px 20px; }
    .modal-footer { background: #ccc; }

    /* オーバーレイのトランジション */
    .modal-enter-active, .modal-leave-active {
      transition: opacity 0.4s;
    }

    /* オーバーレイに包含されているモーダルウィンドウのトランジション */
    .modal-enter-active .modal-window, 
    .modal-leave-active .modal-window { transition: opacity 0.4s, transform 0.4s; }
    
    /* ディレイを付けるとモーダルウィンドウが消えた後にオーバーレイが消える */
    .modal-leave-active { transition: opacity 0.6s ease 0.4s; }

    .modal-enter, .modal-leave-to { opacity: 0; }

    .modal-enter .modal-window, 
    .modal-leave-to .modal-window {
      opacity: 0;
      transform: translateY(-20px);
    }
  </style>
</head>
<body>
  <header id="headerArea" align="center">
    <h2 id="contentsTitle">TextLine-Relator</h2>
  </header>
  <main id="mainArea">
    <div><hr /></div>
    <div id="backScale">
      <!-- /* ここからが Vueインスタンス */ -->
      <section id="vueArea">
        <div class="selectArea" align="center">
          <input type="button" class="btn btn-info" value="dlnote-generator" @click="mode_num=1">
          <input type="button" class="btn btn-info" value="textfile-loader" @click="mode_num=2">
        </div>
        <div class="cornerArea" v-if="mode_num==1">
          <dlnote-generator @change-corner="changeCorner"></dlnote-generator>
        </div>
        <div class="cornerArea" v-if="mode_num==2">
          <div><br /><br /></div>
          <div class="corner fader" align="center">
            <!-- /* ファイル選択orD&D */ -->
            <label id="selectFileArea" class="btn btn-primary" :class="(loaded==1) ? 'none' : ''" for="selectFile">
              <span class="ft20px">テキストファイルを選択してください</span>
              <div class="none"><input type="file" id="selectFile" @change="selectFile" /></div>
            </label><br />
            <div class="textline ft20px" :class="(loaded==0) ? 'none' : 'fader'" align="left">
              <span id="file_title"><b>ファイルタイトル：</b>{{ loadfile.title }}<br /></span><br />
              <div align="center">
                <form name="searching">
                  <div class="searching_inner">
                    <label for="searchword" class="exep">検索語： </label><input type="text" name="word" id="searchword">
                  </div>
                  <div class="searching_inner">
                    <input type="button" name="do" class="btn btn-primary" value="検索">
                    <input type="button" name="clear" class="btn btn-secondary" value="クリア">
                  </div>
                </form>
              </div>
              <b>ファイル内テキスト &#8659;<br /></b><br />
              <span 
                v-for="(line, index) in loadfile.text_array" 
                :id="'line_'+(index+1)" 
              >{{ line }}<br /></span>
            </div><br />
          </div>
        </div>
      </section>
      <!-- /* ここまでが Vueインスタンス */ -->
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <!-- ↓ 非同期通信を実行するために必要 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.18.0/axios.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
  <script type="text/javascript" src="https://code.jquery.com/jquery-3.3.1.js"></script>
  <script src="./static/js/JQ01_gotoTop.js"></script>
  <script type="module">
    import inputGroup from './static/js/VJCP_inputGroup.js';
    import viewNoteArea from './static/js/VJCP_viewNoteArea.js';
    import reviewDlArea from './static/js/VJCP_reviewDlArea.js';
    import transitionModal from './static/js/VJCP_transitionModal.js';
    import dlNoteGenerator from './static/js/VJCP_CORNER_dlNoteGenerator.js';

    const common = new Vue({
      el: '#vueArea',
      data: function () {
        return {
          mode_num: 1,
          loaded: 0,
          loadfile: {
            title: "",
            text_array: [],
          },
        };
      },
      created: function () {
        this.init();
      },
      methods: {
        // 画面初期表示処理
        async init() {

        },
        changeCorner(e) {
          this.mode_num = 2;
        },
        selectFile() {
          // FileListオブジェクト取得
          const selectFiles = document.querySelector("#selectFile").files;

          // Fileオブジェクト取得
          const file = selectFiles[0];
          
          if(file.name.indexOf(".txt")<0){
            alert("選択されたファイルがテキストファイルではありません。")
          }else{
            // FileReaderオブジェクト取得
            const reader = new FileReader();
            reader.readAsText(file);

            // ファイル読み込み完了時の処理
            reader.onload = () => {
              let text_array = reader.result.split("\n");
              this.loadfile.title = file.name;
              this.loadfile.text_array = text_array;
              this.loaded = 1;
            }

            // ファイル読み込みエラー時の処理
            reader.onerror = () => {
              console.log("ファイル読み込みエラー");
            }
          }
        }
      },
    });
  </script>
</body>
</html>
